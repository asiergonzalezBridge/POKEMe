<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
     <link rel="stylesheet" href="../../styles/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header"></div>
    <h2>Registro</h2>
<input type ="text" id="newUser" placeholder="nuevo usuario">
<input type="email" id="email" placeholder="correo electrónico">
<input type ="password" id ="newPass" placeholder = "nueva contraseña">
<input type ="password" id ="repeatPass" placeholder = "confirmar contraseña">
<select id="pokeType">
    <option value="">Selecciona tipo</option>
    <option value="fire">Fuego</option>
    <option value="water">Agua</option>
    <option value="grass">Planta</option>
    <option value="electric">Eléctrico</option>
</select>
<button id="registerBtn">Registro</button>
<p id="message"></p>
<div id="footer"></div>

<script type="module" src="../../js/auth.js"></script>
</body>
</html>
